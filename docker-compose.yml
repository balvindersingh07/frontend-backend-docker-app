version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask-backend
    ports:
      - "5000:5000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: express-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      # Use backend service name for inter-container communication.
      - BACKEND_URL=http://backend:5000/submit
      - PORT=3000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
